<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thor Personal</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon.png" />

    <!-- SEO -->
    <meta
      name="description"
      content="Transforme seu corpo. Treinamento e consultoria com foco em performance e resultados reais com a Thor Personal."
    />
    <meta name="robots" content="index,follow" />

    <!-- OpenGraph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Thor Personal" />
    <meta
      property="og:description"
      content="Transforme seu corpo. Treinamento e consultoria com foco em performance e resultados reais com a Thor Personal."
    />
    <meta property="og:image" content="./images/logo.png" />
    <meta property="og:locale" content="pt_BR" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Thor Personal" />
    <meta
      name="twitter:description"
      content="Transforme seu corpo. Treinamento e consultoria com foco em performance e resultados reais com a Thor Personal."
    />
    <meta name="twitter:image" content="./images/logo.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Thor Personal",
        "description": "Transforme seu corpo. Treinamento e consultoria com foco em performance e resultados reais com a Thor Personal.",
        "url": "/",
        "sameAs": [
          "https://instagram.com/thor.personal",
          "https://youtube.com/@thor.personal"
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

</html>
